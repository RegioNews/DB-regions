nt:'Новосибирская область'},{name:'Байкал-Daily',url:'https://www.baikal-daily.ru/rss/',region_hint:'Республика Бурятия'},{name:'ИА Хакасия',url:'https://19rusinfo.ru/rss',region_hint:'Республика Хакасия'},{name:'Заб.ру',url:'https://zab.ru/rss',region_hint:'Забайкальский край'}]};
const CATS=['all','politics','economy','emergency','social','army','culture','sport','transport','health','education','housing','ecology','security'];
const CAT_LABEL={all:'Все',politics:'Политика',economy:'Экономика',emergency:'ЧП',social:'Социальное',army:'СВО',culture:'Культура',sport:'Спорт',transport:'Транспорт',health:'Здравоохранение',education:'Образование',housing:'ЖКХ',ecology:'Экология',security:'Безопасность'};
const CAT_COLOR={politics:'var(--blue)',economy:'var(--gold)',emergency:'var(--not)',social:'var(--ok)',army:'var(--warn)',culture:'#a86fdf',sport:'var(--org)',transport:'#7c8bd6',health:'#d163a7',education:'#4f98a3',housing:'#bb653b',ecology:'#6daa45',security:'#dd6974',other:'var(--mut)'};
const ALIASES={'москва':'Москва','московской области':'Московская область','подмосковье':'Московская область','санкт-петербург':'Санкт-Петербург','петербург':'Санкт-Петербург','челябинск':'Челябинская область','челябинской области':'Челябинская область','екатеринбург':'Свердловская область','свердловской области':'Свердловская область','краснодарского края':'Краснодарский край','краснодар':'Краснодарский край','ростовской области':'Ростовская область','ростов-на-дону':'Ростовская область','дагестан':'Республика Дагестан','иркутской области':'Иркутская область','новосибирской области':'Новосибирская область','красноярского края':'Красноярский край','приморского края':'Приморский край','татарстан':'Республика Татарстан','башкортостан':'Башкортостан','белгородской области':'Белгородская область','курской области':'Курская область','брянской области':'Брянская область','воронежской области':'Воронежская область','крыма':'Республика Крым','севастополя':'Севастополь','пермского края':'Пермский край','самарской области':'Самарская область','нижегородской области':'Нижегородская область'};
const PROXIES=[u=>'https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://corsproxy.io/?'+encodeURIComponent(u)]; if(location.protocol==='file:'){ document.getElementById('status').textContent='Для live-RSS откройте файл через GitHub Pages или локальный HTTP-сервер, а не через file://'; }
const DEMO=[['Новый мост через реку сдан в эксплуатацию досрочно','economy','Регион.ру'],['Паводок угрожает нескольким сёлам: введён режим ЧС','emergency','ТАСС'],['Губернатор встретился с главой федерального ведомства','politics','РИА Новости'],['Открылся новый корпус областной больницы','social','Регион.ру'],['Волонтёры отправили гуманитарный конвой в зону СВО','army','РИА Новости'],['Фестиваль народного творчества собрал тысячи зрителей','culture','Культура.рф'],['Местная команда вышла в финал регионального чемпионата','sport','Спорт-регион']];
let regions=[],activeCat='all',activeRegion=null,query='',keywordQuery='',selectedFO='all',selectedRegion='all'; const cache=new Map(); let miniSearch=null; let indexedDocs=[]; let searchResultIds=null;
function themeToggle(){const r=document.documentElement; r.setAttribute('data-theme', r.getAttribute('data-theme')==='dark'?'light':'dark'); draw();}
document.getElementById('themeBtn').onclick=themeToggle;
function classify(t){t=t.toLowerCase(); if(/пожар|дтп|авар|взрыв|павод|подтоп|шторм|чс|обруш/.test(t)) return 'emergency'; if(/сво|обстрел|бпла|дрон|военн|минобороны|фронт/.test(t)) return 'army'; if(/завод|инвест|производств|бюджет|эконом|строительств|предприят/.test(t)) return 'economy'; if(/губернатор|мэр|депутат|правительств|закон|власти|совет/.test(t)) return 'politics'; if(/школ|вуз|университет|образован|егэ|учебн|детсад/.test(t)) return 'education'; if(/больниц|поликлиник|медици|врач|здравоохран|фельдшер/.test(t)) return 'health'; if(/жкх|отоплен|капремонт|вода|мусор|благоустрой/.test(t)) return 'housing'; if(/транспорт|автобус|трамва|метро|дорог|развязк|аэропорт/.test(t)) return 'transport'; if(/эколог|лесн|загрязнен|воздух|свалк/.test(t)) return 'ecology'; if(/мчс|полици|правопоряд|безопасност/.test(t)) return 'security'; if(/социал|выплат|семь|пенси|льгот/.test(t)) return 'social'; if(/фестиваль|музей|театр|выставк|концерт|культур/.test(t)) return 'culture'; if(/спорт|матч|турнир|чемпионат|кубок/.test(t)) return 'sport'; return 'other';}
function detectRegion(text,hint){const t=text.toLowerCase(); for(const [k,v] of Object.entries(ALIASES)) if(t.includes(k)) return v; return hint||null;}
function regionFO(name){for(const [fo,arr] of Object.entries(FD)) if(arr.includes(name)) return fo; return 'Прочее';}
function hoursAgo(d){const mins=Math.max(1,Math.round((Date.now()-d.getTime())/60000)); if(mins<60) return mins+' мин назад'; return Math.round(mins/60)+' ч назад';}
function parseXml(xmlText){const xml=new DOMParser().parseFromString(xmlText,'text/xml'); return Array.from(xml.querySelectorAll('item,entry')).map(n=>({title:n.querySelector('title')?.textContent||'', description:n.querySelector('description,summary,content')?.textContent||'', link:n.querySelector('link')?.getAttribute?.('href')||n.querySelector('link')?.textContent||'#', pubDate:n.querySelector('pubDate,published,updated')?.textContent||''}));}
async function fetchFeed(src){if(cache.has(src.url) && Date.now()-cache.get(src.url).ts<10*60*1000) return cache.get(src.url).data; for(const p of PROXIES){try{const res=await fetch(p(src.url),{cache:'no-store'}); if(!res.ok) continue; let data; if(p(src.url).includes('rss2json')) data=await res.json(); else data={items:parseXml(await res.text())}; if((data.items||[]).length){cache.set(src.url,{ts:Date.now(),data}); return data;}}catch(e){}} return {items:[]};}
function buildDemo(){const out=[]; for(const [fo,names] of Object.entries(FD)){ for(const name of names){ const seed=name.charCodeAt(0); const count=Math.max(2,(seed%8)+1); const news=Array.from({length:Math.min(5,count)},(_,i)=>{const [t,c,s]=DEMO[(seed+i)%DEMO.length]; return {title:t,cat:c,src:s,time:(i+1)+' ч назад',date:new Date(Date.now()-(i+1)*3600*1000),link:'#'};}); out.push({name,fo,count,news}); }} return out;}
async function loadLive(){const status=document.getElementById('status'); status.textContent='Подключение к RSS...'; const srcs=[...SOURCES.federal,...SOURCES.regional]; const results=await Promise.all(srcs.map(async s=>({src:s,data:await fetchFeed(s)}))); const items=[]; const cutoff=Date.now()-24*3600*1000; for(const r of results){ for(const it of (r.data.items||[])){ const title=it.title||''; const desc=(it.description||'').replace(/<[^>]+>/g,' '); const date=new Date(it.pubDate||it.published||it.updated||Date.now()); if(isNaN(date.getTime())||date.getTime()<cutoff) continue; const region=detectRegion(title+' '+desc,r.src.region_hint); if(!region) continue; items.push({region,title,summary:desc,link:it.link||'#',date,cat:classify(title+' '+desc),src:r.src.name}); }} if(!items.length){regions=buildDemo(); status.textContent='Живые источники недоступны, показаны демо-данные.'; refreshUI(); return;} const seen=new Map(); items.forEach(x=>seen.set((x.link||'')+'|'+x.title.toLowerCase(),x)); const agg=new Map(); for(const x of seen.values()){ if(!agg.has(x.region)) agg.set(x.region,{name:x.region,fo:regionFO(x.region),count:0,news:[]}); const r=agg.get(x.region); r.count++; r.news.push({title:x.title,summary:x.summary||'',cat:x.cat,src:x.src,time:hoursAgo(x.date),date:x.date,link:x.link}); } regions=Array.from(agg.values()).map(r=>{r.news.sort((a,b)=>b.date-a.date); r.news=r.news.slice(0,30); return r;}); const known=new Set(regions.map(r=>r.name)); Object.entries(FD).forEach(([fo,names])=>names.forEach(name=>{if(!known.has(name)) regions.push({name,fo,count:0,news:[]});})); let docSeq=1; regions.forEach(r=>r.news.forEach(n=>n._docId=docSeq++)); rebuildIndex(); status.textContent='Живые RSS данные · источников: '+srcs.length; refreshUI(); renderRubricator();}
function ensureIndex(){ if(miniSearch) return; miniSearch = new MiniSearch({ fields:['title','summary','src','region','fo','category'], storeFields:['id'], searchOptions:{ prefix:true, fuzzy:0.15, boost:{title:3, region:2, category:2, src:1.2} } }); }
function rebuildIndex(){ ensureIndex(); indexedDocs=[]; let seq=1; regions.forEach(r=>{ r.news.forEach(n=>{ indexedDocs.push({ id:seq++, title:n.title||'', summary:n.summary||'', src:n.src||'', region:r.name||'', fo:r.fo||'', category:n.cat||'' }); }); }); miniSearch.removeAll(); if(indexedDocs.length) miniSearch.addAll(indexedDocs); }
function keywordMatch(n,r){ if(!keywordQuery) return true; if(!miniSearch){ return [n.title||'', n.summary||'', n.src||'', r.name||'', r.fo||''].join(' ').toLowerCase().includes(keywordQuery); } const id = n._docId; return !searchResultIds || searchResultIds.has(id); }
function regionFilterMatch(r){ if(selectedFO!=='all' && r.fo!==selectedFO) return false; if(selectedRegion!=='all' && r.name!==selectedRegion) return false; return true; }
function visibleNews(r){ if(!regionFilterMatch(r)) return []; return r.news.filter(n => (activeCat==='all' || n.cat===activeCat) && keywordMatch(n,r)).slice(0,80); }
function filteredCount(r){ return visibleNews(r).length; }
function populateRegionFilters(){ const foSel=document.getElementById('foFilter'); const regSel=document.getElementById('regionFilter'); if(!foSel||!regSel) return; const fos=['all', ...Object.keys(FD)]; foSel.innerHTML=fos.map(fo=>`<option value="${fo}" ${selectedFO===fo?'selected':''}>${fo==='all'?'Все федеральные округа':fo}</option>`).join(''); let regionNames=regions.map(r=>r.name).sort((a,b)=>a.localeCompare(b,'ru')); if(selectedFO!=='all') regionNames=regions.filter(r=>r.fo===selectedFO).map(r=>r.name).sort((a,b)=>a.localeCompare(b,'ru')); regSel.innerHTML=['all', ...regionNames].map(r=>`<option value="${r}" ${selectedRegion===r?'selected':''}>${r==='all'?'Все регионы':r}</option>`).join(''); }
function refreshUI(){populateRegionFilters(); const vis=regions.filter(regionFilterMatch).map(r=>({...r,vc:filteredCount(r)})); document.getElementById('k1').textContent=vis.reduce((a,b)=>a+b.vc,0); document.getElementById('k2').textContent=vis.filter(x=>x.vc>0).length; document.getElementById('k3').textContent=vis.reduce((a,b)=>a+b.news.filter(n=>n.cat==='emergency').length,0); const top=[...vis].sort((a,b)=>b.vc-a.vc)[0]; document.getElementById('k4').textContent=top?.name||'—'; renderChips(); renderLists(); draw(); if(activeRegion) renderDetail(activeRegion);} 
function renderChips(){const build=target=>{const el=document.getElementById(target); if(!el) return; el.innerHTML=''; CATS.forEach(cat=>{const b=document.createElement('button'); b.className='chip'+(activeCat===cat?' active':''); b.textContent=CAT_LABEL[cat]; b.dataset.cat=cat; b.onclick=()=>{activeCat=cat; refreshUI(); renderRubricator();}; el.appendChild(b);});}; build('chipsSide'); build('chipsMobile');}
function renderRubricator(){ const el=document.getElementById('rubricator'); if(!el) return; el.innerHTML=''; const counts={}; CATS.forEach(c=>counts[c]=0); regions.forEach(r=>{ visibleNews(r).forEach(n=>{ counts[n.cat]=(counts[n.cat]||0)+1; }); }); const wrap=document.createElement('div'); wrap.style.display='flex'; wrap.style.flexWrap='wrap'; wrap.style.gap='8px'; CATS.filter(c=>c!=='all').forEach(cat=>{ const b=document.createElement('button'); b.className='chip'+(activeCat===cat?' active':''); b.style.minHeight='40px'; b.innerHTML=`${CAT_LABEL[cat]} <strong style="margin-left:6px">${counts[cat]||0}</strong>`; b.onclick=()=>{activeCat=cat; refreshUI(); renderRubricator();}; wrap.appendChild(b); }); const reset=document.createElement('button'); reset.className='chip'+(activeCat==='all'?' active':''); reset.textContent='Все темы'; reset.onclick=()=>{activeCat='all'; refreshUI(); renderRubricator();}; el.appendChild(reset); el.appendChild(wrap); }
function renderLists(){const render=id=>{const el=document.getElementById(id); el.innerHTML=''; const g={}; for(const r of regions){ const regionText=(r.name+' '+r.fo).toLowerCase(); const regionPass=!query || regionText.includes(query); const filterPass=regionFilterMatch(r); const newsPass=!keywordQuery || visibleNews(r).length>0; if(!(regionPass && filterPass && newsPass)) continue; if(!g[r.fo]) g[r.fo]=[]; g[r.fo].push(r);} for(const [fo,arr] of Object.entries(g)){ const h=document.createElement('div'); h.className='fo'; h.textContent=fo; el.appendChild(h); arr.sort((a,b)=>filteredCount(b)-filteredCount(a)).forEach(r=>{ const d=document.createElement('div'); d.className='item'+(activeRegion===r.name?' active':''); d.innerHTML=`<span>${r.name}</span><strong>${filteredCount(r)}</strong>`; d.onclick=()=>{activeRegion=r.name; renderLists(); renderDetail(r.name); draw(); showMobile('map');}; el.appendChild(d);}); }}; render('regionListSide'); render('regionListMobile');}
function highlight(text){ if(!keywordQuery) return text; let out=text; keywordQuery.split(/\s+/).filter(Boolean).forEach(w=>{ const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\]/g,'\\$&')+')','ig'); out=out.replace(re,'<mark style="background:color-mix(in oklab, var(--pri) 28%, transparent); color:inherit; padding:0 2px; border-radius:4px">$1</mark>'); }); return out; }
function renderDetail(name){const r=regions.find(x=>x.name===name); document.getElementById('dt').textContent=name; const items=visibleNews(r); document.getElementById('dc').textContent=items.length+' новостей'; const feed=document.getElementById('feed'); feed.innerHTML=''; if(!items.length){feed.innerHTML='<div class="news">Нет новостей по фильтру</div>'; return;} items.forEach(n=>{const d=document.createElement('div'); d.className='news'; const excerpt=n.summary?`<div style="margin-top:6px;color:var(--mut);font-size:13px">${highlight((n.summary||'').slice(0,180))}</div>`:''; d.innerHTML=`<div style="font-weight:600"><a href="${n.link}" target="_blank" rel="noopener noreferrer">${highlight(n.title)}</a></div>${excerpt}<div class="meta"><span style="color:${CAT_COLOR[n.cat]||'var(--mut)'}">${CAT_LABEL[n.cat]||n.cat}</span><span>${n.src}</span><span>${n.time}</span></div>`; feed.appendChild(d);});}
function color(c){if(c===0)return 'var(--so)'; if(c<3)return 'color-mix(in oklch, var(--pri) 35%, var(--so))'; if(c<7)return 'color-mix(in oklch, var(--org) 45%, var(--so))'; return 'color-mix(in oklch, var(--not) 55%, var(--so))';}
function draw(){const svg=document.getElementById('svg'); svg.innerHTML=''; const W=svg.clientWidth||900,H=svg.clientHeight||420; svg.setAttribute('viewBox',`0 0 ${W} ${H}`); const tt=document.getElementById('tt'); const NS='http://www.w3.org/2000/svg'; const blocks=[{fo:'ЦФО',x:.06,y:.32,w:.12,h:.18},{fo:'СЗФО',x:.04,y:.08,w:.10,h:.22},{fo:'ЮФО',x:.10,y:.52,w:.10,h:.16},{fo:'СКФО',x:.10,y:.68,w:.08,h:.14},{fo:'ПФО',x:.20,y:.28,w:.11,h:.30},{fo:'УФО',x:.33,y:.15,w:.09,h:.28},{fo:'СФО',x:.44,y:.14,w:.20,h:.34},{fo:'ДФО',x:.66,y:.05,w:.30,h:.70}]; blocks.forEach(b=>{const arr=regions.filter(r=>r.fo===b.fo); const cols=Math.ceil(Math.sqrt(Math.max(arr.length,1))),rows=Math.ceil(arr.length/cols),bw=b.w*W,bh=b.h*H,bx=b.x*W,by=b.y*H,cw=bw/cols,ch=bh/rows; const label=document.createElementNS(NS,'text'); label.setAttribute('x', bx+bw/2); label.setAttribute('y', by-4); label.setAttribute('text-anchor','middle'); label.setAttribute('font-size','10'); label.setAttribute('fill','currentColor'); label.style.color='var(--faint)'; label.textContent=b.fo; svg.appendChild(label); arr.forEach((r,i)=>{const col=i%cols,row=Math.floor(i/cols),x=bx+col*cw+2,y=by+row*ch+2,w=cw-4,h=ch-4; const rect=document.createElementNS(NS,'rect'); rect.setAttribute('x',x); rect.setAttribute('y',y); rect.setAttribute('width',w); rect.setAttribute('height',h); rect.setAttribute('rx',4); rect.setAttribute('fill',color(filteredCount(r))); rect.setAttribute('stroke',activeRegion===r.name?'var(--pri)':'var(--bd)'); rect.setAttribute('stroke-width',activeRegion===r.name?2:1); rect.style.cursor='pointer'; rect.addEventListener('mouseenter',()=>{tt.style.opacity=1;tt.innerHTML='<strong>'+r.name+'</strong><br>'+filteredCount(r)+' новостей';}); rect.addEventListener('mousemove',(e)=>{const box=svg.getBoundingClientRect();tt.style.left=(e.clientX-box.left+10)+'px';tt.style.top=(e.clientY-box.top+10)+'px';}); rect.addEventListener('mouseleave',()=>tt.style.opacity=0); rect.addEventListener('click',()=>{activeRegion=r.name; renderLists(); renderDetail(r.name); draw();}); svg.appendChild(rect);});});}
function bindSearch(id){document.getElementById(id).addEventListener('input',e=>{query=e.target.value.toLowerCase(); document.getElementById('searchSide').value=query; document.getElementById('searchMobile').value=query; renderLists();});}
bindSearch('searchSide'); bindSearch('searchMobile');
let kwTimer=null; document.getElementById('keywordSearch').addEventListener('input', e=>{ clearTimeout(kwTimer); kwTimer=setTimeout(()=>{ keywordQuery=e.target.value.toLowerCase().trim(); if(keywordQuery && miniSearch){ const results = miniSearch.search(keywordQuery); searchResultIds = new Set(results.map(r=>r.id)); } else { searchResultIds = null; } refreshUI(); renderRubricator(); if(activeRegion) renderDetail(activeRegion); }, 180); });
document.getElementById('foFilter').addEventListener('change', e=>{ selectedFO=e.target.value; if(selectedFO!=='all' && selectedRegion!=='all'){ const reg=regions.find(r=>r.name===selectedRegion); if(!reg || reg.fo!==selectedFO) selectedRegion='all'; } activeRegion = selectedRegion!=='all' ? selectedRegion : activeRegion; refreshUI(); renderRubricator(); if(activeRegion) renderDetail(activeRegion); });
document.getElementById('regionFilter').addEventListener('change', e=>{ selectedRegion=e.target.value; if(selectedRegion!=='all'){ const reg=regions.find(r=>r.name===selectedRegion); if(reg){ selectedFO=reg.fo; activeRegion=reg.name; } } refreshUI(); renderRubricator(); if(activeRegion) renderDetail(activeRegion); });
function showMobile(view){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===view)); const sheet=document.getElementById('sheet-filters'); const map=document.getElementById('view-map'); if(window.innerWidth>900){sheet.classList.remove('active'); return;} if(view==='filters'){sheet.classList.add('active'); map.classList.add('hidden-mobile');} else if(view==='detail'){sheet.classList.remove('active'); map.classList.remove('hidden-mobile'); document.querySelector('.detail').scrollIntoView({behavior:'smooth',block:'start'});} else {sheet.classList.remove('active'); map.classList.remove('hidden-mobile');}}
document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>showMobile(b.dataset.view));
loadLive(); setInterval(()=>{if(document.visibilityState==='visible') loadLive();},15*60*1000); window.addEventListener('resize',draw);
</script>
