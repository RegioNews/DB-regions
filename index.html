const PROXIES=[u=>'https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://corsproxy.io/?'+encodeURIComponent(u)]; if(location.protocol==='file:'){ document.getElementById('status').textContent='–Ф–ї—П live-RSS –Њ—В–Ї—А–Њ–є—В–µ —Д–∞–є–ї —З–µ—А–µ–Ј GitHub Pages –Є–ї–Є –ї–Њ–Ї–∞–ї—М–љ—Л–є HTTP-—Б–µ—А–≤–µ—А, –∞ –љ–µ —З–µ—А–µ–Ј file://'; }
const DEMO=[['–Э–Њ–≤—Л–є –Љ–Њ—Б—В —З–µ—А–µ–Ј —А–µ–Ї—Г —Б–і–∞–љ –≤ —Н–Ї—Б–њ–ї—Г–∞—В–∞—Ж–Є—О –і–Њ—Б—А–Њ—З–љ–Њ','economy','–†–µ–≥–Є–Њ–љ.—А—Г'],['–Я–∞–≤–Њ–і–Њ–Ї —Г–≥—А–Њ–ґ–∞–µ—В –љ–µ—Б–Ї–Њ–ї—М–Ї–Є–Љ —Б—С–ї–∞–Љ: –≤–≤–µ–і—С–љ —А–µ–ґ–Є–Љ –І–°','emergency','–Ґ–Р–°–°'],['–У—Г–±–µ—А–љ–∞—В–Њ—А –≤—Б—В—А–µ—В–Є–ї—Б—П —Б –≥–ї–∞–≤–Њ–є —Д–µ–і–µ—А–∞–ї—М–љ–Њ–≥–Њ –≤–µ–і–Њ–Љ—Б—В–≤–∞','politics','–†–Ш–Р –Э–Њ–≤–Њ—Б—В–Є'],['–Ю—В–Ї—А—Л–ї—Б—П –љ–Њ–≤—Л–є –Ї–Њ—А–њ—Г—Б –Њ–±–ї–∞—Б—В–љ–Њ–є –±–Њ–ї—М–љ–Є—Ж—Л','social','–†–µ–≥–Є–Њ–љ.—А—Г'],['–Т–Њ–ї–Њ–љ—В—С—А—Л –Њ—В–њ—А–∞–≤–Є–ї–Є –≥—Г–Љ–∞–љ–Є—В–∞—А–љ—Л–є –Ї–Њ–љ–≤–Њ–є –≤ –Ј–Њ–љ—Г –°–Т–Ю','army','–†–Ш–Р –Э–Њ–≤–Њ—Б—В–Є'],['–§–µ—Б—В–Є–≤–∞–ї—М –љ–∞—А–Њ–і–љ–Њ–≥–Њ —В–≤–Њ—А—З–µ—Б—В–≤–∞ —Б–Њ–±—А–∞–ї —В—Л—Б—П—З–Є –Ј—А–Є—В–µ–ї–µ–є','culture','–Ъ—Г–ї—М—В—Г—А–∞.—А—Д'],['–Ь–µ—Б—В–љ–∞—П –Ї–Њ–Љ–∞–љ–і–∞ –≤—Л—И–ї–∞ –≤ —Д–Є–љ–∞–ї —А–µ–≥–Є–Њ–љ–∞–ї—М–љ–Њ–≥–Њ —З–µ–Љ–њ–Є–Њ–љ–∞—В–∞','sport','–°–њ–Њ—А—В-—А–µ–≥–Є–Њ–љ']];
let regions=[],activeCat='all',activeRegion=null,query=''; const cache=new Map();
function themeToggle(){const r=document.documentElement; r.setAttribute('data-theme', r.getAttribute('data-theme')==='dark'?'light':'dark'); draw();}
document.getElementById('themeBtn').onclick=themeToggle;
function classify(t){t=t.toLowerCase(); if(/–њ–Њ–ґ–∞—А|–і—В–њ|–∞–≤–∞—А|–≤–Ј—А—Л–≤|–њ–∞–≤–Њ–і|–њ–Њ–і—В–Њ–њ|—И—В–Њ—А–Љ|—З—Б|–Њ–±—А—Г—И/.test(t)) return 'emergency'; if(/—Б–≤–Њ|–Њ–±—Б—В—А–µ–ї|–±–њ–ї–∞|–і—А–Њ–љ|–≤–Њ–µ–љ–љ|–Љ–Є–љ–Њ–±–Њ—А–Њ–љ—Л|—Д—А–Њ–љ—В/.test(t)) return 'army'; if(/–Ј–∞–≤–Њ–і|–Є–љ–≤–µ—Б—В|–њ—А–Њ–Є–Ј–≤–Њ–і—Б—В–≤|–±—О–і–ґ–µ—В|—Н–Ї–Њ–љ–Њ–Љ|—Б—В—А–Њ–Є—В–µ–ї—М—Б—В–≤|–њ—А–µ–і–њ—А–Є—П—В/.test(t)) return 'economy'; if(/–≥—Г–±–µ—А–љ–∞—В–Њ—А|–Љ—Н—А|–і–µ–њ—Г—В–∞—В|–њ—А–∞–≤–Є—В–µ–ї—М—Б—В–≤|–Ј–∞–Ї–Њ–љ|–≤–ї–∞—Б—В–Є|—Б–Њ–≤–µ—В/.test(t)) return 'politics'; if(/—И–Ї–Њ–ї|–±–Њ–ї—М–љ–Є—Ж|–њ–Њ–ї–Є–Ї–ї–Є–љ–Є–Ї|–ґ–Є–ї—М|–і–Њ—А–Њ–≥|–ґ–Ї—Е|—Б–Њ—Ж–Є–∞–ї|–≤—Л–њ–ї–∞—В|–і–µ—В—Б–∞–і/.test(t)) return 'social'; if(/—Д–µ—Б—В–Є–≤–∞–ї—М|–Љ—Г–Ј–µ–є|—В–µ–∞—В—А|–≤—Л—Б—В–∞–≤–Ї|–Ї–Њ–љ—Ж–µ—А—В|–Ї—Г–ї—М—В—Г—А/.test(t)) return 'culture'; if(/—Б–њ–Њ—А—В|–Љ–∞—В—З|—В—Г—А–љ–Є—А|—З–µ–Љ–њ–Є–Њ–љ–∞—В|–Ї—Г–±–Њ–Ї/.test(t)) return 'sport'; return 'other';}
function detectRegion(text,hint){const t=text.toLowerCase(); for(const [k,v] of Object.entries(ALIASES)) if(t.includes(k)) return v; return hint||null;}
function regionFO(name){for(const [fo,arr] of Object.entries(FD)) if(arr.includes(name)) return fo; return '–Я—А–Њ—З–µ–µ';}
function hoursAgo(d){const mins=Math.max(1,Math.round((Date.now()-d.getTime())/60000)); if(mins<60) return mins+' –Љ–Є–љ –љ–∞–Ј–∞–і'; return Math.round(mins/60)+' —З –љ–∞–Ј–∞–і';}
function parseXml(xmlText){const xml=new DOMParser().parseFromString(xmlText,'text/xml'); return Array.from(xml.querySelectorAll('item,entry')).map(n=>({title:n.querySelector('title')?.textContent||'', description:n.querySelector('description,summary,content')?.textContent||'', link:n.querySelector('link')?.getAttribute?.('href')||n.querySelector('link')?.textContent||'#', pubDate:n.querySelector('pubDate,published,updated')?.textContent||''}));}
async function fetchFeed(src){if(cache.has(src.url) && Date.now()-cache.get(src.url).ts<10*60*1000) return cache.get(src.url).data; for(const p of PROXIES){try{const res=await fetch(p(src.url),{cache:'no-store'}); if(!res.ok) continue; let data; if(p(src.url).includes('rss2json')) data=await res.json(); else data={items:parseXml(await res.text())}; if((data.items||[]).length){cache.set(src.url,{ts:Date.now(),data}); return data;}}catch(e){}} return {items:[]};}
function buildDemo(){const out=[]; for(const [fo,names] of Object.entries(FD)){ for(const name of names){ const seed=name.charCodeAt(0); const count=Math.max(2,(seed%8)+1); const news=Array.from({length:Math.min(5,count)},(_,i)=>{const [t,c,s]=DEMO[(seed+i)%DEMO.length]; return {title:t,cat:c,src:s,time:(i+1)+' —З –љ–∞–Ј–∞–і',date:new Date(Date.now()-(i+1)*3600*1000),link:'#'};}); out.push({name,fo,count,news}); }} return out;}
async function loadLive(){const status=document.getElementById('status'); status.textContent='–Я–Њ–і–Ї–ї—О—З–µ–љ–Є–µ –Ї RSS...'; const srcs=[...SOURCES.federal,...SOURCES.regional]; const results=await Promise.all(srcs.map(async s=>({src:s,data:await fetchFeed(s)}))); const items=[]; const cutoff=Date.now()-24*3600*1000; for(const r of results){ for(const it of (r.data.items||[])){ const title=it.title||''; const desc=(it.description||'').replace(/<[^>]+>/g,' '); const date=new Date(it.pubDate||it.published||it.updated||Date.now()); if(isNaN(date.getTime())||date.getTime()<cutoff) continue; const region=detectRegion(title+' '+desc,r.src.region_hint); if(!region) continue; items.push({region,title,link:it.link||'#',date,cat:classify(title+' '+desc),src:r.src.name}); }} if(!items.length){regions=buildDemo(); status.textContent='–Ц–Є–≤—Л–µ –Є—Б—В–Њ—З–љ–Є–Ї–Є –љ–µ–і–Њ—Б—В—Г–њ–љ—Л, –њ–Њ–Ї–∞–Ј–∞–љ—Л –і–µ–Љ–Њ-–і–∞–љ–љ—Л–µ.'; refreshUI(); return;} const seen=new Map(); items.forEach(x=>seen.set((x.link||'')+'|'+x.title.toLowerCase(),x)); const agg=new Map(); for(const x of seen.values()){ if(!agg.has(x.region)) agg.set(x.region,{name:x.region,fo:regionFO(x.region),count:0,news:[]}); const r=agg.get(x.region); r.count++; r.news.push({title:x.title,cat:x.cat,src:x.src,time:hoursAgo(x.date),date:x.date,link:x.link}); } regions=Array.from(agg.values()).map(r=>{r.news.sort((a,b)=>b.date-a.date); r.news=r.news.slice(0,30); return r;}); const known=new Set(regions.map(r=>r.name)); Object.entries(FD).forEach(([fo,names])=>names.forEach(name=>{if(!known.has(name)) regions.push({name,fo,count:0,news:[]});})); status.textContent='–Ц–Є–≤—Л–µ RSS –і–∞–љ–љ—Л–µ ¬Ј –Є—Б—В–Њ—З–љ–Є–Ї–Њ–≤: '+srcs.length; refreshUI();}
function filteredCount(r){return activeCat==='all'?r.count:r.news.filter(n=>n.cat===activeCat).length}
function refreshUI(){const vis=regions.map(r=>({...r,vc:filteredCount(r)})); document.getElementById('k1').textContent=vis.reduce((a,b)=>a+b.vc,0); document.getElementById('k2').textContent=vis.filter(x=>x.vc>0).length; document.getElementById('k3').textContent=vis.reduce((a,b)=>a+b.news.filter(n=>n.cat==='emergency').length,0); const top=[...vis].sort((a,b)=>b.vc-a.vc)[0]; document.getElementById('k4').textContent=top?.name||'вАФ'; renderChips(); renderLists(); draw(); if(activeRegion) renderDetail(activeRegion);} 
function renderChips(){const build=target=>{const el=document.getElementById(target); el.innerHTML=''; CATS.forEach(cat=>{const b=document.createElement('button'); b.className='chip'+(activeCat===cat?' active':''); b.textContent=CAT_LABEL[cat]; b.dataset.cat=cat; b.onclick=()=>{activeCat=cat; refreshUI();}; el.appendChild(b);});}; build('chipsSide'); build('chipsMobile');}
function renderLists(){const render=id=>{const el=document.getElementById(id); el.innerHTML=''; const g={}; for(const r of regions){ if(query && !r.name.toLowerCase().includes(query)) continue; if(!g[r.fo]) g[r.fo]=[]; g[r.fo].push(r);} for(const [fo,arr] of Object.entries(g)){ const h=document.createElement('div'); h.className='fo'; h.textContent=fo; el.appendChild(h); arr.sort((a,b)=>filteredCount(b)-filteredCount(a)).forEach(r=>{ const d=document.createElement('div'); d.className='item'+(activeRegion===r.name?' active':''); d.innerHTML=`<span>${r.name}</span><strong>${filteredCount(r)}</strong>`; d.onclick=()=>{activeRegion=r.name; renderLists(); renderDetail(r.name); draw(); showMobile('map');}; el.appendChild(d);}); }}; render('regionListSide'); render('regionListMobile');}
function renderDetail(name){const r=regions.find(x=>x.name===name); document.getElementById('dt').textContent=name; const items=activeCat==='all'?r.news:r.news.filter(n=>n.cat===activeCat); document.getElementById('dc').textContent=items.length+' –љ–Њ–≤–Њ—Б—В–µ–є'; const feed=document.getElementById('feed'); feed.innerHTML=''; if(!items.length){feed.innerHTML='<div class="news">–Э–µ—В –љ–Њ–≤–Њ—Б—В–µ–є –њ–Њ —Д–Є–ї—М—В—А—Г</div>'; return;} items.forEach(n=>{const d=document.createElement('div'); d.className='news'; d.innerHTML=`<div style="font-weight:600"><a href="${n.link}" target="_blank" rel="noopener noreferrer">${n.title}</a></div><div class="meta"><span style="color:${CAT_COLOR[n.cat]||'var(--mut)'}">${CAT_LABEL[n.cat]||n.cat}</span><span>${n.src}</span><span>${n.time}</span></div>`; feed.appendChild(d);});}
function color(c){if(c===0)return 'var(--so)'; if(c<3)return 'color-mix(in oklch, var(--pri) 35%, var(--so))'; if(c<7)return 'color-mix(in oklch, var(--org) 45%, var(--so))'; return 'color-mix(in oklch, var(--not) 55%, var(--so))';}
function draw(){const svg=document.getElementById('svg'); svg.innerHTML=''; const W=svg.clientWidth||900,H=svg.clientHeight||420; svg.setAttribute('viewBox',`0 0 ${W} ${H}`); const tt=document.getElementById('tt'); const NS='http://www.w3.org/2000/svg'; const blocks=[{fo:'–¶–§–Ю',x:.06,y:.32,w:.12,h:.18},{fo:'–°–Ч–§–Ю',x:.04,y:.08,w:.10,h:.22},{fo:'–Ѓ–§–Ю',x:.10,y:.52,w:.10,h:.16},{fo:'–°–Ъ–§–Ю',x:.10,y:.68,w:.08,h:.14},{fo:'–Я–§–Ю',x:.20,y:.28,w:.11,h:.30},{fo:'–£–§–Ю',x:.33,y:.15,w:.09,h:.28},{fo:'–°–§–Ю',x:.44,y:.14,w:.20,h:.34},{fo:'–Ф–§–Ю',x:.66,y:.05,w:.30,h:.70}]; blocks.forEach(b=>{const arr=regions.filter(r=>r.fo===b.fo); const cols=Math.ceil(Math.sqrt(Math.max(arr.length,1))),rows=Math.ceil(arr.length/cols),bw=b.w*W,bh=b.h*H,bx=b.x*W,by=b.y*H,cw=bw/cols,ch=bh/rows; const label=document.createElementNS(NS,'text'); label.setAttribute('x', bx+bw/2); label.setAttribute('y', by-4); label.setAttribute('text-anchor','middle'); label.setAttribute('font-size','10'); label.setAttribute('fill','currentColor'); label.style.color='var(--faint)'; label.textContent=b.fo; svg.appendChild(label); arr.forEach((r,i)=>{const col=i%cols,row=Math.floor(i/cols),x=bx+col*cw+2,y=by+row*ch+2,w=cw-4,h=ch-4; const rect=document.createElementNS(NS,'rect'); rect.setAttribute('x',x); rect.setAttribute('y',y); rect.setAttribute('width',w); rect.setAttribute('height',h); rect.setAttribute('rx',4); rect.setAttribute('fill',color(filteredCount(r))); rect.setAttribute('stroke',activeRegion===r.name?'var(--pri)':'var(--bd)'); rect.setAttribute('stroke-width',activeRegion===r.name?2:1); rect.style.cursor='pointer'; rect.addEventListener('mouseenter',()=>{tt.style.opacity=1;tt.innerHTML='<strong>'+r.name+'</strong><br>'+filteredCount(r)+' –љ–Њ–≤–Њ—Б—В–µ–є';}); rect.addEventListener('mousemove',(e)=>{const box=svg.getBoundingClientRect();tt.style.left=(e.clientX-box.left+10)+'px';tt.style.top=(e.clientY-box.top+10)+'px';}); rect.addEventListener('mouseleave',()=>tt.style.opacity=0); rect.addEventListener('click',()=>{activeRegion=r.name; renderLists(); renderDetail(r.name); draw();}); svg.appendChild(rect);});});}
function bindSearch(id){document.getElementById(id).addEventListener('input',e=>{query=e.target.value.toLowerCase(); document.getElementById('searchSide').value=query; document.getElementById('searchMobile').value=query; renderLists();});}
bindSearch('searchSide'); bindSearch('searchMobile');
function showMobile(view){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===view)); const sheet=document.getElementById('sheet-filters'); const map=document.getElementById('view-map'); if(window.innerWidth>900){sheet.classList.remove('active'); return;} if(view==='filters'){sheet.classList.add('active'); map.classList.add('hidden-mobile');} else if(view==='detail'){sheet.classList.remove('active'); map.classList.remove('hidden-mobile'); document.querySelector('.detail').scrollIntoView({behavior:'smooth',block:'start'});} else {sheet.classList.remove('active'); map.classList.remove('hidden-mobile');}}
document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>showMobile(b.dataset.view));
loadLive(); setInterval(()=>{if(document.visibilityState==='visible') loadLive();},15*60*1000); window.addEventListener('resize',draw);
</script>
</body>
</html>
